{% load static %}
<div class="account-page">
    <div class="container">
        <div class="row">
            <div class="col-2">
                <img src="{% static 'images/image1.png' %}" width="100%">
            </div>
            <div class="col-2">
                <div class="form-container">

                    <div class="form-btn">
                        <span onclick="login()">Login</span>
                        <span onclick="register()">Register</span>
                        <hr id="Indicator">
                    </div>
                    <form id="LoginForm" method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <input type="text" name="username" placeholder="Username" autocomplete="off">
                        <input type="password" name="password" placeholder="Password" autocomplete="new-password">
                        <button type="submit" name="login" class="btn">Login</button>
                        <a href="">Forget Password</a>
                    </form>
                    {% if messages %}
                    {% for m in messages %}
                    <p class="{{m.tags}}">{{m}}</p>
                    {% endfor %}
                    {% endif %}
                    {% csrf_token %}
                    <form id="RegForm" method="post" enctype="multipart/form-data" onsubmit="return verify()">
                        <input type="text" placeholder="Username" name="username" required maxlength="15" minlength="2"
                            autocomplete="off">
                        <input type="text" placeholder="Address" name="address" required minlength="5">
                        <input type="tel" placeholder="PhNo" name="phone" required minlength="10">
                        <input type="email" placeholder="Email" required name="email">
                        <input type="password" placeholder="Password" required minlength="8" name="password"
                            autocomplete="new-password">
                        <input type="password" placeholder="Confirm password" required minlength="8" name="conpass"
                            autocomplete="new-password">
                        <button type="submit" class="btn" name="register">Register</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    var MenuItems = document.getElementById("MenuItems");
    MenuItems.style.maxHeight = "0px";
    function verify() {
        var pass = document.getElementsByName("password").value;
        var conpass = document.getElementsByName("conpass").value;
        console.log(pass, conpass)
        if (pass != conpass) {
            alert("Passwords do not match");
            return false;
        }

        return true;
    }
    function menutoggle() {
        if (MenuItems.style.maxHeight == "0px") {
            MenuItems.style.maxHeight = "200px"
        }
        else {
            MenuItems.style.maxHeight = "0px"
        }
    }
</script>

<!-- Toggle Form -->
<script>
    var LoginForm = document.getElementById("LoginForm");
    var RegForm = document.getElementById("RegForm");
    var Indicator = document.getElementById("Indicator");
    function register() {
        RegForm.style.transform = "translatex(0px)";
        LoginForm.style.transform = "translatex(0px)";
        Indicator.style.transform = "translateX(100px)";
    }
    function login() {
        RegForm.style.transform = "translatex(300px)";
        LoginForm.style.transform = "translatex(300px)";
        Indicator.style.transform = "translate(0px)";
    }
</script>
{% if register %}
<script>
    register()
</script>
{% else %}
<script>
    login()
</script>
{% endif %}
