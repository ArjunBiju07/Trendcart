{% load static %}


<!-- Featured Products -->

<div class="small-container">
    <h2 class="title">Featured Products</h2>
    <div class="row">
        {% for prdt in featured %}
        <div class="col-4">
            <a href="{% url 'product_details' prdt.id %}"><img src="{{ prdt.image.url }}"></a>
            <h4>{{prdt.title}}</h4>
            <div class="rating">
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star-o"></i>
            </div>
            <p>${{prdt.price}}</p>
        </div>
        {% endfor %}
    </div>

<!-- latest -->
    <h2 class="title">Latest Products</h2>
    <div class="row">
        {% for prdt in latest %}
        <div class="col-4">
            <a href="{% url 'product_details' prdt.id %}"><img src="{{prdt.image.url}}"></a>
            
            <h4>{{ prdt.title }}</h4>
            <div class="rating">
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star"></i>
                <i class="fa fa-star-o"></i>
            </div>
            <p>${{ prdt.price }}</p>
        </div>
        {% endfor %}
    </div>
</div>
